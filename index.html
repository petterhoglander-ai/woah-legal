<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woah Recovery App — Legal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #ffffff; --fg: #1a1a1a; --subtle: #555; --border: #e0e0e0; }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111; --fg: #f0f0f0; --subtle: #aaa; --border: #2a2a2a; }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px; line-height: 1.7;
    color: var(--fg); background: var(--bg);
    max-width: 480px; margin: 0 auto; padding: 48px 24px;
  }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  p { color: var(--subtle); margin-bottom: 32px; font-size: 15px; }
  a { display: block; padding: 16px 0; border-bottom: 1px solid var(--border); color: var(--fg); text-decoration: none; font-weight: 500; }
  a:hover { opacity: 0.6; }
</style>
</head>
<body>
  <h1>Woah</h1>
  <p>Legal documents for the Woah Recovery app.</p>
  <a href="privacy.html">Privacy Policy →</a>
  <a href="terms.html">Terms of Use →</a>
</body>
</html>
