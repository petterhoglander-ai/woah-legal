<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Woah — finally understand your wearable data</title>
<meta name="description" content="Woah turns the numbers from your wearable into one clear recovery score, and one honest message, every morning." />
<meta name="theme-color" content="#000000" />
<meta property="og:title" content="Woah — finally understand your wearable data" />
<meta property="og:description" content="One clear recovery score every morning. Actionable insight, made for you." />
<meta property="og:type" content="website" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  :root {
    --gold: #D4B776;
    --bg: #000;
    --shot-w: clamp(168px, 21vw, 230px);
    --gap: clamp(14px, 2vw, 28px);
  }
  body {
    background: var(--bg); color: #fff;
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; gap: clamp(26px, 5vh, 46px);
    padding-top: clamp(60px, 12vh, 128px);
    padding-bottom: clamp(32px, 6vh, 64px);
    overflow-x: hidden;
  }

  /* ---- Screenshot gallery: a centred trio (3 at a time) ---- */
  .gallery { width: 100%; display: flex; justify-content: center; }
  .track {
    display: flex; align-items: center;
    gap: var(--gap);
    /* exactly three screenshots wide, centred on the page */
    width: calc(var(--shot-w) * 3 + var(--gap) * 2);
    max-width: 100%;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-block: 6px;
  }
  .track::-webkit-scrollbar { display: none; }

  .shot {
    flex: 0 0 var(--shot-w);
    width: var(--shot-w);
    scroll-snap-align: center;
    border-radius: 28px;
    overflow: hidden;
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 56px rgba(0,0,0,0.5);
    transition: opacity .4s ease, box-shadow .4s ease;
    opacity: 0.92;
  }
  .shot.active {
    opacity: 1;
    box-shadow: 0 26px 78px rgba(0,0,0,0.62), 0 0 0 1px rgba(212,183,118,0.22);
  }

  /* ---- Mobile: one screenshot at a time ---- */
  @media (max-width: 680px) {
    :root { --shot-w: min(80vw, 340px); }
    .track { width: var(--shot-w); }
  }
  .shot img {
    display: block; width: 100%; height: auto;
    aspect-ratio: 351 / 760;
    object-fit: cover;
    pointer-events: none; user-select: none;
  }

  /* ---- Page control (Apple-style dots) ---- */
  .dots { display: flex; gap: 9px; align-items: center; }
  .dots button {
    width: 7px; height: 7px; padding: 0; border: 0; cursor: pointer;
    border-radius: 50%; background: rgba(255,255,255,0.26);
    transition: all .35s ease;
  }
  .dots button.on { background: #fff; width: 24px; border-radius: 4px; }
  .dots button:hover { background: rgba(255,255,255,0.5); }
  .dots button.on:hover { background: #fff; }

  /* ---- App Store CTA ---- */
  .cta {
    position: relative; display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 30px; border-radius: 999px;
    font-family: "New York", ui-serif, Georgia, serif;
    font-size: 17px; font-weight: 500; letter-spacing: 0.04em;
    color: #fff; text-decoration: none;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -6px 14px rgba(255,255,255,0.05), 0 10px 34px rgba(0,0,0,0.45);
    transition: transform .2s ease, background .25s ease;
  }
  .cta::before { content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0) 46%); mix-blend-mode: screen; }
  .cta:hover { background: rgba(255,255,255,0.16); transform: translateY(-1px); }
  .cta:active { transform: scale(0.985); }
  .cta svg { width: 17px; height: 20px; fill: #fff; margin-top: -3px; }

  .legal { font-size: 12px; color: rgba(255,255,255,0.32); text-align: center; }
  .legal a { color: inherit; text-decoration: none; margin: 0 7px; }
  .legal a:hover { color: rgba(255,255,255,0.6); }

  @media (prefers-reduced-motion: reduce) {
    .shot { transition: opacity .2s ease; }
  }
</style>
</head>
<body>
  <div class="gallery">
    <div class="track" id="track">
      <figure class="shot"><img src="screens/screen-1.jpg" alt="Finally understand your wearable data" loading="eager" decoding="async" /></figure>
      <figure class="shot"><img src="screens/screen-2.jpg" alt="A clear recovery score every morning — 70 out of 100, caution" loading="eager" decoding="async" /></figure>
      <figure class="shot"><img src="screens/screen-3.jpg" alt="Your whole day, answered — train, sickness, sleep and movement" loading="lazy" decoding="async" /></figure>
      <figure class="shot"><img src="screens/screen-4.jpg" alt="See how your partner is doing" loading="lazy" decoding="async" /></figure>
      <figure class="shot"><img src="screens/screen-5.jpg" alt="All your health, decoded — recovery, lifestyle, sleep debt, habits and trends" loading="lazy" decoding="async" /></figure>
      <figure class="shot"><img src="screens/screen-6.jpg" alt="Gentle by design — calm, personal daily notifications" loading="lazy" decoding="async" /></figure>
    </div>
  </div>

  <div class="dots" id="dots" role="tablist" aria-label="Screenshot navigation"></div>

  <a class="cta" href="https://apps.apple.com/se/app/woah-recovery/id6776171727" aria-label="Woah on the App Store">
    <svg viewBox="0 0 384 512" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
    App Store
  </a>

  <div class="legal">
    <a href="mailto:petter.hoglander@gmail.com?subject=Woah%20support">Support</a>
    <a href="https://petterhoglander-ai.github.io/woah-legal/privacy.html">Privacy</a>
    <a href="https://petterhoglander-ai.github.io/woah-legal/terms.html">Terms</a>
  </div>

<script>
  const track = document.getElementById('track');
  const dotsEl = document.getElementById('dots');
  const shots = [...track.querySelectorAll('.shot')];

  // Build page-control dots
  shots.forEach((_, i) => {
    const b = document.createElement('button');
    b.setAttribute('role', 'tab');
    b.setAttribute('aria-label', 'Go to screenshot ' + (i + 1));
    b.addEventListener('click', () => scrollToShot(i));
    dotsEl.appendChild(b);
  });
  const dots = [...dotsEl.children];

  let active = -1;
  function setActive(i) {
    if (i === active) return;
    active = i;
    shots.forEach((s, k) => s.classList.toggle('active', k === i));
    dots.forEach((d, k) => {
      const on = k === i;
      d.classList.toggle('on', on);
      d.setAttribute('aria-selected', on ? 'true' : 'false');
    });
  }
  function scrollToShot(i) {
    const s = shots[i];
    const left = s.offsetLeft - (track.clientWidth - s.clientWidth) / 2;
    track.scrollTo({ left, behavior: 'smooth' });
  }

  // Sync active shot to whichever is closest to the track centre
  let raf = null;
  function onScroll() {
    if (raf) return;
    raf = requestAnimationFrame(() => {
      raf = null;
      const mid = track.scrollLeft + track.clientWidth / 2;
      let best = 0, bestDist = Infinity;
      shots.forEach((s, k) => {
        const c = s.offsetLeft + s.clientWidth / 2;
        const d = Math.abs(c - mid);
        if (d < bestDist) { bestDist = d; best = k; }
      });
      setActive(best);
    });
  }
  track.addEventListener('scroll', onScroll, { passive: true });

  // Keyboard arrows (desktop)
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') scrollToShot(Math.min(active + 1, shots.length - 1));
    if (e.key === 'ArrowLeft')  scrollToShot(Math.max(active - 1, 0));
  });

  // Start centred on the first screenshot
  window.addEventListener('load', () => { scrollToShot(0); setActive(0); });
  setActive(0);
</script>
</body>
</html>
