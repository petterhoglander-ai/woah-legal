<style>
  /* Serif fallback for non-Apple devices (New York is Apple-only).
     Literata italic, self-hosted latin subset — same eBook-serif genre. */
  @font-face {
    font-family: "Literata";
    font-style: italic;
    font-weight: 200 700;
    font-display: swap;
    src: url("fonts/literata-italic.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+2013-2014, U+2018-201D;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  :root {
    --gold: #D4B776;
    --bg: #000;
    --serif: "New York", "Literata", ui-serif, Georgia, serif;
    --shot-w: clamp(168px, 21vw, 230px);
    --gap: clamp(14px, 2vw, 28px);
  }
  body {
    background: var(--bg); color: #fff;
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden;
  }

  /* ================= Hero ================= */
  .hero {
    position: relative; width: 100%;
    min-height: 100svh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: clamp(18px, 3.2vh, 30px);
    padding: clamp(48px, 9vh, 96px) 22px clamp(40px, 7vh, 72px);
    text-align: center;
  }
  /* Barely-there gold bloom behind the orb — depth without noise */
  .hero::before {
    content: ""; position: absolute; left: 50%; top: 58%;
    width: min(88vw, 720px); aspect-ratio: 1;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(212,183,118,0.07), rgba(212,183,118,0.02) 42%, transparent 68%);
    pointer-events: none;
  }

  .brand {
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.44em; text-indent: 0.44em; /* indent re-centres tracked text */
    color: var(--gold); text-transform: uppercase;
  }

  h1 {
    font-family: var(--serif); font-style: italic; font-weight: 300;
    font-size: clamp(38px, 7.2vw, 68px);
    line-height: 1.08; letter-spacing: -0.015em;
    max-width: 15ch;
  }

  .sub {
    font-family: var(--serif); font-style: italic;
    font-size: clamp(16px, 2vw, 19px); line-height: 1.55;
    color: rgba(255,255,255,0.58);
    max-width: 40ch;
  }

  /* Orb with score read-out — the product itself, front and centre */
  .orb-wrap {
    position: relative;
    width: clamp(220px, 30vh, 280px); aspect-ratio: 1;
    display: grid; place-items: center;
    margin-block: clamp(4px, 1.5vh, 14px);
  }
  .orb-wrap canvas { width: 100%; height: 100%; display: block; }
  .orb-wrap.no-gl canvas { display: none; }
  .orb-wrap.no-gl::before {
    content: ""; position: absolute; inset: 9%;
    border-radius: 50%;
    border: 1px solid rgba(84,214,138,0.4);
    box-shadow: 0 0 44px rgba(84,214,138,0.22), inset 0 0 44px rgba(84,214,138,0.12);
  }
  .orb-score {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; pointer-events: none;
  }
  .orb-score .eyebrow {
    font-size: 10px; letter-spacing: 0.16em; text-indent: 0.16em; font-weight: 500;
    text-transform: uppercase; color: rgba(255,255,255,0.48); /* ≥4.5:1 on black */
    transform: translateY(4px);
  }
  .orb-score .num {
    display: inline-flex; align-items: baseline; gap: 1px;
    font-family: var(--serif); font-style: italic; font-weight: 200;
    font-size: clamp(56px, 8vh, 72px); line-height: 1;
    color: #fff; font-variant-numeric: tabular-nums;
  }
  .orb-score .num small { font-size: 0.42em; font-weight: 200; color: rgba(255,255,255,0.9); }
  .orb-score .state {
    font-size: 15px; letter-spacing: 0.18em; text-indent: 0.18em; font-weight: 600;
    text-transform: uppercase; color: rgba(255,255,255,0.48); /* ≥4.5:1 on black */
    transform: translateY(-3px);
  }

  /* Slow, staggered rise-in — premium pace, never snappy */
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  .hero > * { animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .hero > *:nth-child(2) { animation-delay: 0.08s; }
  .hero > *:nth-child(3) { animation-delay: 0.18s; }
  .hero > *:nth-child(4) { animation-delay: 0.30s; }
  .hero > *:nth-child(5) { animation-delay: 0.44s; }
  .hero > *:nth-child(6) { animation-delay: 0.58s; }

  .scroll-cue {
    position: absolute; bottom: clamp(14px, 3vh, 30px); left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.30);
    animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.1s both;
  }
  .scroll-cue svg { width: 18px; height: 18px; stroke: currentColor; }
  @keyframes drift { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 6px); } }
  .scroll-cue { animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) 1.1s both, drift 2.6s ease-in-out 2.2s infinite; }

  /* ================= Gallery section ================= */
  .showcase {
    width: 100%;
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(26px, 5vh, 46px);
    padding-top: clamp(30px, 6vh, 56px);
    padding-bottom: clamp(32px, 6vh, 64px);
  }
  .section-eyebrow {
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.3em; text-indent: 0.3em; text-transform: uppercase;
    color: rgba(212,183,118,0.75);
  }

  /* ---- Screenshot gallery: a centred trio (3 at a time) ---- */
  .gallery { width: 100%; display: flex; justify-content: center; }
  .track {
    display: flex; align-items: center;
    gap: var(--gap);
    /* exactly three screenshots wide, centred on the page */
    width: calc(var(--shot-w) * 3 + var(--gap) * 2);
    max-width: 100%;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-block: 6px;
  }
  .track::-webkit-scrollbar { display: none; }

  .shot {
    flex: 0 0 var(--shot-w);
    width: var(--shot-w);
    scroll-snap-align: center;
    border-radius: 28px;
    overflow: hidden;
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 56px rgba(0,0,0,0.5);
    transition: opacity .4s ease, box-shadow .4s ease;
    opacity: 0.92;
  }
  .shot.active {
    opacity: 1;
    box-shadow: 0 26px 78px rgba(0,0,0,0.62), 0 0 0 1px rgba(212,183,118,0.22);
  }

  /* ---- Mobile: one screenshot at a time ---- */
  @media (max-width: 680px) {
    :root { --shot-w: min(80vw, 340px); }
    .track { width: var(--shot-w); }
  }
  .shot img {
    display: block; width: 100%; height: auto;
    aspect-ratio: 351 / 760;
    object-fit: cover;
    pointer-events: none; user-select: none;
  }

  /* ---- Page control (Apple-style dots) ---- */
  .dots { display: flex; gap: 9px; align-items: center; }
  .dots button {
    width: 7px; height: 7px; padding: 0; border: 0; cursor: pointer;
    border-radius: 50%; background: rgba(255,255,255,0.36); /* ≥3:1 non-text contrast */
    transition: all .35s ease;
  }
  .dots button.on { background: #fff; width: 24px; border-radius: 4px; }
  .dots button:hover { background: rgba(255,255,255,0.5); }
  .dots button.on:hover { background: #fff; }
  .dots button:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

  /* ---- App Store CTA ---- */
  .cta {
    position: relative; display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 30px; border-radius: 999px;
    font-family: var(--serif);
    font-size: 17px; font-weight: 500; letter-spacing: 0.04em;
    color: #fff; text-decoration: none; cursor: pointer;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -6px 14px rgba(255,255,255,0.05), 0 10px 34px rgba(0,0,0,0.45);
    transition: transform .2s ease, background .25s ease;
  }
  .cta::before { content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0) 46%); mix-blend-mode: screen; }
  .cta:hover { background: rgba(255,255,255,0.16); transform: translateY(-1px); }
  .cta:active { transform: scale(0.985); }
  .cta:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; }
  .cta svg { width: 17px; height: 20px; fill: #fff; margin-top: -3px; }

  /* ---- QR popover: desktop-only, revealed on hover/focus of the CTA ---- */
  .cta-group { position: relative; display: inline-flex; flex-direction: column; align-items: center; }
  .qr-pop { display: none; }
  @media (hover: hover) and (pointer: fine) and (min-width: 681px) {
    .qr-pop {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      position: absolute; left: calc(100% + 18px); top: 50%;
      padding: 14px 14px 12px;
      border-radius: 22px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(212,183,118,0.30);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 18px 54px rgba(0,0,0,0.55);
      opacity: 0; transform: translate(-10px, -50%) scale(0.97);
      pointer-events: none;
      transition: opacity .38s cubic-bezier(0.22, 1, 0.36, 1), transform .38s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .cta-group:hover .qr-pop,
    .cta-group:focus-within .qr-pop {
      opacity: 1; transform: translate(0, -50%) scale(1);
      pointer-events: auto;
    }
    .qr-pop svg { width: 128px; height: 128px; border-radius: 12px; display: block; }
    .qr-pop .qr-label {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.14em; text-indent: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.55); white-space: nowrap;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .qr-pop { transition: opacity .2s ease; transform: translate(0, -50%) scale(1); }
  }

  .legal { font-size: 12px; color: rgba(255,255,255,0.48); text-align: center; } /* ≥4.5:1 on black */
  .legal a { color: inherit; text-decoration: none; margin: 0 7px; }
  .legal a:hover { color: rgba(255,255,255,0.75); }
  .legal a:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; border-radius: 2px; }

  @media (prefers-reduced-motion: reduce) {
    .hero > *, .scroll-cue { animation: none; }
    .shot { transition: opacity .2s ease; }
  }
</style>

<script>
  /* ================= Hero orb (WebGL, from the app's orb shader) ================= */
  (function () {
    const canvas = document.getElementById('orb');
    const wrap = document.getElementById('orbWrap');
    const gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: true, antialias: true });
    if (!gl) { wrap.classList.add('no-gl'); return; }

    const VERT = `attribute vec2 aPos; varying vec2 vUv; void main(){ vUv=aPos*0.5+0.5; gl_Position=vec4(aPos,0.0,1.0); }`;
    const FRAG = `
precision highp float; varying vec2 vUv;
uniform float uTime, uStatus, uGold; uniform vec2 uRes;
#define PI 3.141592653589793
float sat(float x){return clamp(x,0.0,1.0);} vec3 sat3(vec3 v){return clamp(v,0.0,1.0);}
float hash21(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+19.19);return fract(p.x*p.y);}
float vnoise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(hash21(i),hash21(i+vec2(1.0,0.0)),u.x),mix(hash21(i+vec2(0.0,1.0)),hash21(i+vec2(1.0,1.0)),u.x),u.y);}
vec3 thinFilm(float d,float n,float NoV){float sinI=sqrt(max(0.0,1.0-NoV*NoV));float sinT=sinI/n;
  if(sinT>=1.0)return vec3(0.5);float cosT=sqrt(1.0-sinT*sinT);float opd=2.0*n*d*cosT;
  vec3 lam=vec3(680.0,540.0,450.0);vec3 phase=2.0*PI*opd/lam;vec3 film=0.5+0.5*cos(phase);
  return sat3(film*vec3(0.45,0.65,1.30));}
void main(){
  float t=uTime; float aspect=uRes.x/uRes.y;
  vec2 p=vec2((vUv.x*2.0-1.0)*aspect,(vUv.y*2.0-1.0));
  float ang=atan(p.y,p.x);
  float wob=0.018*sin(2.0*ang+t*0.78)+0.010*sin(3.0*ang-t*0.58)+0.005*sin(5.0*ang+t*0.36)+0.003*sin(7.0*ang-t*0.47);
  float breathe=1.0+0.010*sin(t*0.25+0.8); float R=(0.82+wob)*breathe;
  float sdf=length(p)-R; float lightR=R;
  if(sdf>0.05){ gl_FragColor=vec4(0.0); return; }
  float edgeMask=smoothstep(0.05,-0.014,sdf);
  float nz=sqrt(max(0.0,lightR*lightR-p.x*p.x-p.y*p.y));
  vec3 N=normalize(vec3(p.x,p.y,nz)); float NoV=sat(dot(N,vec3(0.0,0.0,1.0)));
